version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X "main.Version={{.Version}} {{.Os}}/{{.Arch}}"

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  disable: true

brews:
  - repository:
      owner: alwedo
      name: homebrew-tap
      token: "{{ .Env.GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/alwedo/webcatch
    description: "Simple HTTP request inspector that captures and displays incoming requests in real-time"
    license: MIT
    install: |
      bin.install "webcatch"
    test: |
      system "#{bin}/webcatch", "--version"
